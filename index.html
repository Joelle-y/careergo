<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CareerGo · 求职智能匹配与简历诊断平台</title>
  <meta name="description" content="面向在校大学生的AI求职辅助工具——快速匹配岗位、诊断简历差距">

  <!-- Fonts: Outfit (heading) + Work Sans (body) per ui-ux-pro-max design system -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Tailwind CSS via Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Lucide Icons (SVG, per ui-ux-pro-max: no emoji as icons) -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            heading: ['Outfit', 'sans-serif'],
            body: ['Work Sans', 'sans-serif'],
          },
          colors: {
            brand: {
              light: '#94A3B8',  // 冷灰蓝
              DEFAULT: '#475569', // 石板蓝
              dark: '#1E3A5F',   // 深海蓝
              deep: '#0F2942',
            },
            skybg: {
              50: '#F8FAFC',
              100: '#EEF2F7',
            },
          },
        },
      },
    };
  </script>

  <style>
    :root {
      --color-primary: #94A3B8;
      --color-secondary: #475569;
      --color-accent: #1E3A5F;
      --color-bg-start: #F8FAFC;
      --color-bg-end: #E2E8F0;
      --color-text: #0F2942;
      --color-text-muted: #334155;
      --color-border-glass: rgba(255, 255, 255, 0.18);
      --color-surface: rgba(255, 255, 255, 0.12);
      --blur-amount: 24px;
      --glass-opacity: 0.12;
      --shadow-glass: 0 8px 32px rgba(15, 41, 66, 0.06), 0 2px 8px rgba(15, 41, 66, 0.04);
      --shadow-glass-lg: 0 12px 48px rgba(15, 41, 66, 0.1), 0 4px 16px rgba(15, 41, 66, 0.06);
      --radius: 16px;
      --radius-lg: 24px;
      --transition: 200ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    * { -webkit-tap-highlight-color: transparent; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Work Sans', sans-serif;
      color: var(--color-text);
      background: linear-gradient(135deg, var(--color-bg-start) 0%, var(--color-bg-end) 100%);
      background-attachment: fixed;
      min-height: 100vh;
      overflow-x: hidden;
    }

    h1, h2, h3, h4, h5, h6 { font-family: 'Outfit', sans-serif; }

    /* ===== Glassmorphism Core ===== */
    .glass {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: var(--shadow-glass);
      border-radius: var(--radius);
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.22);
      box-shadow: var(--shadow-glass);
      border-radius: var(--radius);
      transition: transform var(--transition), box-shadow var(--transition);
    }

    .glass-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-glass-lg);
    }

    .glass-strong {
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border: 1px solid rgba(255, 255, 255, 0.28);
      box-shadow: var(--shadow-glass-lg);
      border-radius: var(--radius-lg);
    }

    .glass-input {
      background: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 12px;
      transition: all var(--transition);
    }

    .glass-input:focus {
      background: rgba(255, 255, 255, 0.45);
      border-color: var(--color-accent);
      box-shadow: 0 0 0 3px rgba(30, 58, 95, 0.12);
      outline: none;
    }

    .glass-input::placeholder { color: rgba(12, 74, 110, 0.4); }

    .glass-nav {
      background: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.3);
    }

    /* ===== Buttons ===== */
    .btn-primary {
      background: linear-gradient(135deg, var(--color-secondary) 0%, var(--color-accent) 100%);
      color: white;
      border-radius: 12px;
      font-weight: 600;
      transition: all var(--transition);
      box-shadow: 0 4px 16px rgba(30, 58, 95, 0.18);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(30, 58, 95, 0.28);
      filter: brightness(1.05);
    }

    .btn-primary:active { transform: scale(0.98); }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      color: var(--color-text);
      border-radius: 12px;
      font-weight: 500;
      transition: all var(--transition);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.45);
      border-color: var(--color-accent);
    }

    .btn-secondary:active { transform: scale(0.98); }

    /* ===== Background Decorative Blobs ===== */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.3;
      pointer-events: none;
      z-index: 0;
    }

    .blob-1 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #94A3B8 0%, transparent 70%);
      top: -100px; right: -100px;
      animation: float-1 20s ease-in-out infinite;
    }

    .blob-2 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, #475569 0%, transparent 70%);
      bottom: -80px; left: -80px;
      animation: float-2 25s ease-in-out infinite;
    }

    .blob-3 {
      width: 250px; height: 250px;
      background: radial-gradient(circle, #1E3A5F 0%, transparent 70%);
      top: 40%; left: 50%;
      opacity: 0.12;
      animation: float-3 30s ease-in-out infinite;
    }

    @keyframes float-1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-30px, 40px) scale(1.1); }
    }
    @keyframes float-2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(40px, -30px) scale(1.15); }
    }
    @keyframes float-3 {
      0%, 100% { transform: translate(-50%, 0) scale(1); }
      50% { transform: translate(-50%, -40px) scale(1.1); }
    }

    /* ===== Modal ===== */
    .modal-overlay {
      background: rgba(15, 23, 42, 0.3);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .modal-enter { animation: modalIn 300ms cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .modal-exit { animation: modalOut 200ms cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.95) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes modalOut {
      from { opacity: 1; transform: scale(1) translateY(0); }
      to { opacity: 0; transform: scale(0.95) translateY(10px); }
    }

    /* ===== Toast ===== */
    .toast-enter { animation: toastIn 300ms cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .toast-exit { animation: toastOut 200ms ease-out forwards; }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes toastOut {
      from { opacity: 1; transform: translateY(0); }
      to { opacity: 0; transform: translateY(-20px); }
    }

    /* ===== Loading Spinner ===== */
    .spinner {
      width: 20px; height: 20px;
      border: 2.5px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block;
    }
    .spinner-dark {
      border-color: rgba(14, 165, 233, 0.2);
      border-top-color: var(--color-accent);
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== Skeleton Shimmer ===== */
    .skeleton {
      background: linear-gradient(90deg,
        rgba(255,255,255,0.15) 25%,
        rgba(255,255,255,0.35) 50%,
        rgba(255,255,255,0.15) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s ease-in-out infinite;
      border-radius: 8px;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ===== Match Score Ring ===== */
    .score-ring { transform: rotate(-90deg); }
    .score-ring circle { transition: stroke-dashoffset 600ms cubic-bezier(0.16, 1, 0.3, 1); }

    /* ===== View Transitions ===== */
    .view { animation: viewIn 400ms cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes viewIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== Reduced Motion ===== */
    /* ===== Print / PDF ===== */
    @media print {
      body { background: white !important; }
      .blob, .glass-nav, #toast-container, #modal-container { display: none !important; }
      .glass, .glass-card, .glass-strong { background: white !important; backdrop-filter: none !important; box-shadow: none !important; border: none !important; }
      #resume-pdf-page { box-shadow: none !important; border-radius: 0 !important; }
      a { color: inherit; text-decoration: none; }
      @page { margin: 12mm; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
      .blob { display: none; }
    }

    /* ===== Scrollbar ===== */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: rgba(14, 165, 233, 0.2);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover { background: rgba(14, 165, 233, 0.4); }

    /* ===== Focus States (accessibility) ===== */
    button:focus-visible, a:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible {
      outline: 2px solid var(--color-accent);
      outline-offset: 2px;
    }

    /* ===== Tab indicator ===== */
    .tab-active {
      background: linear-gradient(135deg, var(--color-secondary) 0%, var(--color-accent) 100%);
      color: white;
    }

    /* ===== Animated progress bar ===== */
    .progress-bar { transition: width 800ms cubic-bezier(0.16, 1, 0.3, 1); }
  </style>
</head>
<body class="font-body">

  <!-- Decorative background blobs -->
  <div class="blob blob-1" aria-hidden="true"></div>
  <div class="blob blob-2" aria-hidden="true"></div>
  <div class="blob blob-3" aria-hidden="true"></div>

  <!-- App container -->
  <div id="app" class="relative z-10 min-h-screen">
    <!-- Dynamic content renders here -->
  </div>

  <!-- Toast container -->
  <div id="toast-container" class="fixed top-6 right-6 z-[9999] space-y-3" role="status" aria-live="polite" aria-atomic="true"></div>

  <!-- Modal container -->
  <div id="modal-container"></div>

  <script>
    /* ==========================================================
       启鹅 - 求职智能匹配与简历诊断平台
       Front-end logic with localStorage data persistence
       ========================================================== */

    // ===== Lucide icon helper =====
    function icon(name, size = 18, classes = '') {
      return `<i data-lucide="${name}" class="${classes}" width="${size}" height="${size}"></i>`;
    }

    function renderIcons() {
      if (window.lucide) lucide.createIcons();
    }

    // ===== State Management =====
    const State = {
      get(key, def = null) {
        try {
          const v = localStorage.getItem('qie_' + key);
          return v ? JSON.parse(v) : def;
        } catch { return def; }
      },
      set(key, val) {
        localStorage.setItem('qie_' + key, JSON.stringify(val));
      },
      remove(key) {
        localStorage.removeItem('careergo_' + key);
      },
    };

    // ===== Current user & app state =====
    // Demo 用户：点击「开始演示」时使用，无需输入账号密码
    const DEMO_USER = {
      id: 'demo',
      name: '演示同学',
      freeAnalysisRemaining: 3,
      subscriptionType: 'free',
    };
    let currentUser = State.get('currentUser', null);
    let currentView = currentUser ? 'home' : 'landing';
    let selectedJobForAnalysis = null;

    // ===== Toast =====
    function toast(message, type = 'info') {
      const container = document.getElementById('toast-container');
      const colors = {
        success: { bg: 'rgba(34,197,94,0.9)', icon: 'check-circle' },
        error: { bg: 'rgba(239,68,68,0.9)', icon: 'x-circle' },
        info: { bg: 'rgba(14,165,233,0.9)', icon: 'info' },
      };
      const c = colors[type] || colors.info;
      const el = document.createElement('div');
      el.className = 'toast-enter flex items-center gap-2 px-4 py-3 rounded-xl text-white text-sm font-medium shadow-lg';
      el.style.background = c.bg;
      el.style.backdropFilter = 'blur(20px)';
      el.innerHTML = `${icon(c.icon, 18)}<span>${message}</span>`;
      container.appendChild(el);
      renderIcons();
      setTimeout(() => {
        el.className = el.className.replace('toast-enter', 'toast-exit');
        setTimeout(() => el.remove(), 200);
      }, 3500);
    }

    // ===== Modal =====
    function showModal(content) {
      const container = document.getElementById('modal-container');
      container.innerHTML = `
        <div class="modal-overlay fixed inset-0 z-[1000] flex items-center justify-center p-4" id="modal-overlay" onclick="closeModal(event)">
          <div class="modal-enter glass-strong w-full max-w-2xl max-h-[85vh] overflow-y-auto p-6 md:p-8" onclick="event.stopPropagation()" role="dialog" aria-modal="true">
            ${content}
          </div>
        </div>
      `;
    }

    function closeModal(e) {
      if (e && e.target !== e.currentTarget) return;
      const overlay = document.getElementById('modal-overlay');
      if (!overlay) return;
      const panel = overlay.querySelector('.modal-enter');
      if (panel) {
        panel.className = panel.className.replace('modal-enter', 'modal-exit');
      }
      overlay.style.opacity = '0';
      overlay.style.transition = 'opacity 200ms';
      setTimeout(() => { document.getElementById('modal-container').innerHTML = ''; }, 200);
    }

    function closeModalDirect() {
      const overlay = document.getElementById('modal-overlay');
      if (!overlay) return;
      const panel = overlay.querySelector('.modal-enter');
      if (panel) panel.className = panel.className.replace('modal-enter', 'modal-exit');
      overlay.style.opacity = '0';
      overlay.style.transition = 'opacity 200ms';
      setTimeout(() => { document.getElementById('modal-container').innerHTML = ''; }, 200);
    }

    // Close modal on Escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModalDirect();
    });

    // ===== Navigation =====
    function navigate(view) {
      currentView = view;
      State.set('currentView', view);
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ===== Layout: Top Nav =====
    function renderNav() {
      if (!currentUser) return '';
      const remaining = currentUser.freeAnalysisRemaining;
      const subBadge = currentUser.subscriptionType !== 'free'
        ? `<span class="text-xs px-2 py-0.5 rounded-full bg-brand-dark/20 text-brand-deep font-semibold">${currentUser.subscriptionType === 'monthly' ? '月度' : currentUser.subscriptionType === 'quarterly' ? '季度' : '单次'}</span>`
        : '';

      return `
        <nav class="glass-nav sticky top-0 z-50">
          <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
              <button onclick="navigate('home')" class="flex items-center gap-2 cursor-pointer" aria-label="返回首页">
                <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-brand-light to-brand-dark flex items-center justify-center text-white shadow-md">
                  ${icon('bird', 20)}
                </div>
                <span class="font-heading text-xl font-semibold text-slate-800">CareerGo</span>
              </button>

              <div class="flex items-center gap-2 md:gap-4">
                ${subBadge}
                <button onclick="showPaywallModal()" class="glass px-3 py-1.5 flex items-center gap-2 text-sm hover:bg-white/40 transition cursor-pointer rounded-lg" aria-label="查看订阅套餐" title="点击升级订阅">
                  ${icon('zap', 15, 'text-amber-600')}
                  <span class="font-medium text-slate-800">剩余 <span class="font-bold text-brand-dark">${remaining}</span> 次</span>
                  ${icon('chevron-right', 14, 'text-slate-400')}
                </button>
                <div class="flex items-center gap-1">
                  <button onclick="navigate('home')" class="p-2 rounded-lg hover:bg-white/30 transition cursor-pointer ${currentView === 'home' ? 'bg-white/40' : ''}" aria-label="首页">${icon('home', 20)}</button>
                  <button onclick="navigate('resume-pdf')" class="p-2 rounded-lg hover:bg-white/30 transition cursor-pointer ${currentView === 'resume-pdf' ? 'bg-white/40' : ''}" aria-label="简历PDF">${icon('file-text', 20)}</button>
                  <button onclick="navigate('favorites')" class="p-2 rounded-lg hover:bg-white/30 transition cursor-pointer ${currentView === 'favorites' ? 'bg-white/40' : ''}" aria-label="我的收藏">${icon('heart', 20)}</button>
                  <button onclick="logout()" class="p-2 rounded-lg hover:bg-white/30 transition cursor-pointer" aria-label="退出登录">${icon('log-out', 20)}</button>
                </div>
              </div>
            </div>
          </div>
        </nav>
      `;
    }

    // ===== View: Landing (Apple-style product page) =====
    function viewLanding() {
      return `
        <div class="view min-h-screen">
          <!-- Top bar -->
          <nav class="glass-nav sticky top-0 z-50">
            <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between h-16">
              <div class="flex items-center gap-2">
                <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-brand-light to-brand-dark flex items-center justify-center text-white shadow-md">${icon('bird', 20)}</div>
                <span class="font-heading text-xl font-semibold text-slate-800">CareerGo</span>
              </div>
              <button onclick="navigate('login')" class="text-sm text-slate-600 hover:text-slate-800 transition cursor-pointer">登录</button>
            </div>
          </nav>

          <!-- Hero -->
          <section class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 pt-20 pb-24 text-center">
            <p class="text-sm tracking-[0.3em] uppercase text-slate-500 mb-6">CareerGo</p>
            <h1 class="font-heading text-5xl md:text-7xl font-bold text-slate-900 leading-[1.05] tracking-tight">
              求职这件事，<br>交给 AI 来想。
            </h1>
            <p class="text-lg md:text-xl text-slate-500 mt-8 max-w-2xl mx-auto leading-relaxed">
              上传简历，AI 为你匹配岗位、诊断差距、优化表达。<br>每一次投递，都更接近理想的 offer。
            </p>
            <button onclick="navigate('login')" class="btn-primary mt-12 px-10 py-4 text-lg cursor-pointer inline-flex items-center gap-2">
              立即启程 ${icon('arrow-right', 22)}
            </button>
            <p class="text-xs text-slate-400 mt-4">免费体验 · 无需信用卡</p>
          </section>

          <!-- Feature 1 -->
          <section class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
            <div class="glass-card p-8 md:p-14">
              <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-center">
                <div>
                  <p class="text-sm tracking-widest uppercase text-slate-500 mb-3">智能匹配</p>
                  <h2 class="font-heading text-3xl md:text-4xl font-bold text-slate-900 leading-tight">懂你的简历，<br>更懂你要的岗位。</h2>
                  <p class="text-slate-500 mt-5 leading-relaxed">基于技能、学历、经验三维匹配，实时搜索真实岗位。匹配度一目了然，理由清晰可见。</p>
                </div>
                <div class="flex justify-center">
                  <div class="w-40 h-40 rounded-full bg-gradient-to-br from-brand-light/30 to-brand-dark/30 flex items-center justify-center text-brand-dark">${icon('search', 64)}</div>
                </div>
              </div>
            </div>
          </section>

          <!-- Feature 2 -->
          <section class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="glass-card p-8 md:p-14">
              <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-center">
                <div class="flex justify-center order-2 md:order-1">
                  <div class="w-40 h-40 rounded-full bg-gradient-to-br from-brand-light/30 to-brand-dark/30 flex items-center justify-center text-brand-dark">${icon('file-search', 64)}</div>
                </div>
                <div class="order-1 md:order-2">
                  <p class="text-sm tracking-widest uppercase text-slate-500 mb-3">简历诊断</p>
                  <h2 class="font-heading text-3xl md:text-4xl font-bold text-slate-900 leading-tight">哪里不足，<br>哪里能更好。</h2>
                  <p class="text-slate-500 mt-5 leading-relaxed">逐项对比岗位要求，列出匹配与缺失。给出优先级建议与改写示范，让简历刀刀见血。</p>
                </div>
              </div>
            </div>
          </section>

          <!-- Feature 3 -->
          <section class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
            <div class="glass-card p-8 md:p-14">
              <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-center">

    function switchLoginTab(tab) {
      const phoneForm = document.getElementById('form-phone');
      const emailForm = document.getElementById('form-email');
      const tabPhone = document.getElementById('tab-phone');
      const tabEmail = document.getElementById('tab-email');
      if (tab === 'phone') {
        phoneForm.classList.remove('hidden');
        emailForm.classList.add('hidden');
        tabPhone.classList.add('tab-active');
        tabPhone.classList.remove('text-slate-600');
        tabEmail.classList.remove('tab-active');
        tabEmail.classList.add('text-slate-600');
        tabPhone.setAttribute('aria-selected', 'true');
        tabEmail.setAttribute('aria-selected', 'false');
      } else {
        emailForm.classList.remove('hidden');
        phoneForm.classList.add('hidden');
        tabEmail.classList.add('tab-active');
        tabEmail.classList.remove('text-slate-600');
        tabPhone.classList.remove('tab-active');
        tabPhone.classList.add('text-slate-600');
        tabEmail.setAttribute('aria-selected', 'true');
        tabPhone.setAttribute('aria-selected', 'false');
      }
    }

    function togglePassword(id, btn) {
      const input = document.getElementById(id);
      if (input.type === 'password') {
        input.type = 'text';
        btn.innerHTML = icon('eye-off', 18);
      } else {
        input.type = 'password';
        btn.innerHTML = icon('eye', 18);
      }
      renderIcons();
    }

    let codeCountdown = null;
    function sendCode(e) {
      e.preventDefault();
      const phone = document.getElementById('phone').value;
      if (!/^1[3-9]\d{9}$/.test(phone)) {
        toast('请输入正确的手机号', 'error');
        return;
      }
      const btn = e.target;
      btn.disabled = true;
      let sec = 60;
      btn.textContent = `${sec}s 后重发`;
      toast('验证码已发送（模拟：123456）', 'success');
      codeCountdown = setInterval(() => {
        sec--;
        btn.textContent = `${sec}s 后重发`;
        if (sec <= 0) {
          clearInterval(codeCountdown);
          btn.disabled = false;
          btn.textContent = '获取验证码';
        }
      }, 1000);
    }

    function handlePhoneLogin(e) {
      e.preventDefault();
      const phone = document.getElementById('phone').value;
      const code = document.getElementById('code').value;
      if (code !== '123456') {
        toast('验证码错误，请输入 123456', 'error');
        return;
      }
      doLogin({ id: 'u_' + phone, name: '用户' + phone.slice(-4), phone, freeAnalysisRemaining: 3, subscriptionType: 'free' });
    }

    function handleEmailLogin(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      if (password.length < 6) {
        toast('密码至少 6 位', 'error');
        return;
      }
      const name = email.split('@')[0];
      doLogin({ id: 'u_' + email, name, email, freeAnalysisRemaining: 3, subscriptionType: 'free' });
    }

    function switchResumeTab(tab) {

      const tabManual = document.getElementById('tab-manual');
      if (tab === 'upload') {
        panelUpload.classList.remove('hidden');
        panelManual.classList.add('hidden');
        tabUpload.classList.add('tab-active');
        tabUpload.classList.remove('text-slate-600');
        tabManual.classList.remove('tab-active');
        tabManual.classList.add('text-slate-600');
        tabUpload.setAttribute('aria-selected', 'true');
        tabManual.setAttribute('aria-selected', 'false');
      } else {
        panelManual.classList.remove('hidden');
        panelUpload.classList.add('hidden');
        tabManual.classList.add('tab-active');
        tabManual.classList.remove('text-slate-600');
        tabUpload.classList.remove('tab-active');
        tabUpload.classList.add('text-slate-600');
        tabManual.setAttribute('aria-selected', 'true');
        tabUpload.setAttribute('aria-selected', 'false');

        validateManualForm();
      }
    }

    // ===== Multi-Resume Data Layer =====
    // Supports multiple resumes for subscribed users; single resume for free users.
    // Backward-compatible: auto-migrates legacy single resume to array format.
    const Resumes = {
      getAll() {
        let list = State.get('resumes_' + currentUser.id, null);
        if (!list) {
          // Migrate legacy single resume
          const legacy = State.get('resume_' + currentUser.id, null);
          if (legacy) {
            list = [{ id: 'r_' + Date.now(), name: '默认简历', ...legacy }];
            State.set('resumes_' + currentUser.id, list);
          } else {
            list = [];
          }
        }
        return list;
      },
      getActiveId() {
        return State.get('activeResumeId_' + currentUser.id, null);
      },
      getActive() {
        const list = this.getAll();
        const activeId = this.getActiveId();
        if (list.length === 0) return null;
        return list.find(r => r.id === activeId) || list[0];
      },
      setActive(id) {
        State.set('activeResumeId_' + currentUser.id, id);
      },
      upsert(resume) {
        const list = this.getAll();
        const idx = list.findIndex(r => r.id === resume.id);
        if (idx >= 0) {
          list[idx] = resume;
        } else {
          resume.id = resume.id || ('r_' + Date.now());
          list.push(resume);
        }
        State.set('resumes_' + currentUser.id, list);
        // Sync legacy key for backward compat
        State.set('resume_' + currentUser.id, resume);
        return resume;
      },
      remove(id) {
        let list = this.getAll();
        list = list.filter(r => r.id !== id);
        State.set('resumes_' + currentUser.id, list);
        if (this.getActiveId() === id) {
          const newActive = list[0] || null;
          State.set('activeResumeId_' + currentUser.id, newActive ? newActive.id : null);
          if (newActive) State.set('resume_' + currentUser.id, newActive);
          else State.remove('resume_' + currentUser.id);
        }
        return list;
      },
      count() {
        return this.getAll().length;
      },
      canAdd() {
        // Free users: max 1 resume; Subscribed: unlimited
        if (currentUser.subscriptionType !== 'free') return true;
        return this.count() < 1;
      },
    };

    function applyRewriteToResume(analysisId) {
      const analyses = State.get('analyses_' + currentUser.id, []);
      const analysis = analyses.find(a => a.id === analysisId);
      if (!analysis) return;
      const resume = Resumes.getActive();
      if (!resume) {
        toast('请先上传简历', 'error');
        return;
      }
      // 从 rewriteExample 中提取【优化后】部分的文字
      let optimizedText = analysis.rewriteExample || '';
      const afterMatch = optimizedText.match(/【优化后】([\s\S]*)/);
      if (afterMatch) {
        optimizedText = afterMatch[1].trim();
      }
      // 将优化后的文字追加到原有简历内容后面
      const existing = resume.experienceSummary || '';
      resume.experienceSummary = existing ? existing + '\n\n' + optimizedText : optimizedText;
      resume.updatedAt = Date.now();
      Resumes.upsert(resume);
      toast('优化内容已追加到简历', 'success');
      navigate('resume');
    }

    function calculateMatchScore(job, resume, form) {
      let skillScore = 0, eduScore = 0, expScore = 0;
      const reasons = [];

      // Skill match (40%)
      const jobSkills = job.skills.map(s => s.toLowerCase());
      const resumeSkills = resume.skills.map(s => s.toLowerCase());
      const matchedSkills = jobSkills.filter(s => resumeSkills.some(rs => rs.includes(s) || s.includes(rs)));
      skillScore = (matchedSkills.length / jobSkills.length) * 100;
      if (matchedSkills.length > 0) {
        reasons.push(`技能匹配 ${matchedSkills.length}/${jobSkills.length}：${matchedSkills.map(s => job.skills[jobSkills.indexOf(s)]).join('、')}`);
      }

      // Education match (30%)
      const eduLevel = { '大专': 1, '本科': 2, '硕士': 3, '博士': 4 };
      if (eduLevel[resume.education] >= eduLevel[job.education]) {
        eduScore = 100;
        reasons.push(`学历满足要求（${resume.education} ≥ ${job.education}）`);
      } else {
        eduScore = 50;
      }

      // Experience match (30%) - simplified: check if interest aligns with job title
      const interestKeywords = form.interest.toLowerCase().split(/[\s,，、]+/).filter(Boolean);
      const titleLower = job.title.toLowerCase();
      const interestMatch = interestKeywords.some(k => titleLower.includes(k) || job.skills.some(s => s.toLowerCase().includes(k)));
      expScore = interestMatch ? 100 : 40;
      if (interestMatch) {
        reasons.push('兴趣方向与岗位高度契合');
      }

      const total = Math.round(skillScore * 0.4 + eduScore * 0.3 + expScore * 0.3);
      return { rate: total, reasons };
    }

    function matchColor(rate) {
      if (rate >= 80) return { text: 'text-green-600', bg: 'bg-green-500', stroke: '#22c55e', label: '高度匹配' };
      if (rate >= 60) return { text: 'text-brand-dark', bg: 'bg-brand-dark', stroke: '#0ea5e9', label: '良好匹配' };
      if (rate >= 40) return { text: 'text-amber-600', bg: 'bg-amber-500', stroke: '#f59e0b', label: '一般匹配' };
      return { text: 'text-slate-400', bg: 'bg-slate-400', stroke: '#94a3b8', label: '匹配度低' };
    }

    function startAnalysis(jobId) {
      const job = MOCK_JOBS.find(j => j.id === jobId);

      const resume = Resumes.getActive();
      if (!resume) {
        toast('请先上传简历', 'error');
        navigate('resume');
        return;
      }

      // Check quota
      if (currentUser.freeAnalysisRemaining <= 0 && currentUser.subscriptionType === 'free') {
        showPaywallModal();
        return;
      }

      selectedJobForAnalysis = job;
      navigate('analysis-loading');

      // Simulate AI analysis
      setTimeout(() => {
        const result = generateAnalysis(job, resume);
        const analyses = State.get('analyses_' + currentUser.id, []);
        const record = {
          id: 'a_' + Date.now(),
          userId: currentUser.id,
          jobId: job.id,
          jobTitle: job.title,
          company: job.company,
          matchRate: result.matchRate,
          matchedItems: result.matched,
          missingItems: result.missing,
          suggestions: result.suggestions,
          rewriteExample: result.rewrite,
          analyzedAt: Date.now(),
        };
        analyses.push(record);
        State.set('analyses_' + currentUser.id, analyses);

        // Decrement free quota
        if (currentUser.subscriptionType === 'free') {
          currentUser.freeAnalysisRemaining--;
          State.set('currentUser', currentUser);
          // Also update stored user
          State.set('user_' + currentUser.id, currentUser);
        }

        navigate('analysis-result');
        // Store current analysis id for display
        window._currentAnalysisId = record.id;
        render();
      }, 3000);
    }

    function generateAnalysis(job, resume) {
      const jobSkills = job.skills.map(s => s.toLowerCase());
      const resumeSkills = resume.skills.map(s => s.toLowerCase());
      const matched = [];
      const missing = [];

      jobSkills.forEach((s, i) => {
        const origSkill = job.skills[i];
        if (resumeSkills.some(rs => rs.includes(s) || s.includes(rs))) {
          matched.push(origSkill);
        } else {
          missing.push(origSkill);
        }
      });

      const eduLevel = { '大专': 1, '本科': 2, '硕士': 3, '博士': 4 };
      const eduMatch = eduLevel[resume.education] >= eduLevel[job.education];
      if (eduMatch) matched.push(`学历（${resume.education}）`);
      else missing.push(`学历（岗位要求${job.education}）`);

      // Soft skills check (simplified)
      const softSkills = ['沟通', '团队协作', '学习能力'];
      softSkills.forEach(s => {
        if (resume.experienceSummary && resume.experienceSummary.includes(s)) {
          matched.push(s);
        } else {
          missing.push(s);
        }
      });

      const matchRate = Math.round((matched.length / (matched.length + missing.length)) * 100);

      const suggestions = [
        { priority: 'high', text: missing.length > 0 ? `补充缺失技能：${missing.slice(0, 3).join('、')}` : '技能匹配度良好，保持学习', detail: '建议在简历中突出相关项目经验，即使没有工作经历也可以写课程项目或个人作品。' },
        { priority: 'medium', text: '强化项目经历描述', detail: '使用 STAR 法则（情境-任务-行动-结果）量化你的贡献，如"优化页面加载速度 30%"。' },
        { priority: 'low', text: '添加个人作品链接', detail: '如果有 GitHub 主页、个人博客或在线作品集，建议在简历顶部添加链接。' },
      ];

      const rewrite = `【优化前】${resume.experienceSummary || '在校期间参与项目开发'}

【优化后】在校期间主导校园电商平台前端开发（React + TypeScript），独立完成商品展示、购物车、支付流程等核心模块，优化首屏加载速度提升 40%，服务 2000+ 在校学生。曾在某互联网公司实习，参与内部管理系统迭代，熟悉 Git 协作流程与敏捷开发模式。`;

      return { matchRate, matched, missing, suggestions, rewrite };
    }

                <svg width="100" height="100" class="score-ring">
                  <circle cx="50" cy="50" r="40" fill="none" stroke="rgba(14,165,233,0.1)" stroke-width="8"/>
                  <circle cx="50" cy="50" r="40" fill="none" stroke="${c.stroke}" stroke-width="8" stroke-linecap="round" stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"/>
                </svg>
                <div class="absolute inset-0 flex flex-col items-center justify-center">
                  <span class="font-heading text-3xl font-bold ${c.text}">${analysis.matchRate}%</span>
                  <span class="text-xs text-slate-500">总匹配度</span>
                </div>
              </div>
              <div class="flex-1 text-center md:text-left">
                <h1 class="font-heading text-2xl font-bold text-slate-800">简历诊断报告</h1>
                <p class="text-slate-500 mt-1">${analysis.jobTitle} · ${analysis.company}</p>
                <p class="text-xs text-slate-400/70 mt-1">分析时间：${new Date(analysis.analyzedAt).toLocaleString('zh-CN')}</p>
                <div class="mt-3">
                  <span class="text-sm px-3 py-1 rounded-full ${c.bg}/15 ${c.text} font-medium">${c.label}</span>
                </div>
              </div>
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
            <!-- Matched items -->
            <div class="glass-card p-6">
              <h3 class="font-heading text-lg font-semibold text-green-600 mb-4">${icon('check-circle', 20, 'inline mr-1.5')}匹配项 (${analysis.matchedItems.length})</h3>
              <div class="space-y-2">
                ${analysis.matchedItems.map(item => `
                  <div class="flex items-center gap-2 glass p-2.5 rounded-lg">
                    <span class="text-green-500 shrink-0">${icon('check', 16)}</span>
                    <span class="text-sm text-slate-700">${item}</span>
                  </div>
                `).join('')}
              </div>
            </div>

            <!-- Missing items -->
            <div class="glass-card p-6">
              <h3 class="font-heading text-lg font-semibold text-red-500 mb-4">${icon('x-circle', 20, 'inline mr-1.5')}缺失项 (${analysis.missingItems.length})</h3>
              <div class="space-y-2">
                ${analysis.missingItems.length === 0
                  ? '<p class="text-sm text-slate-500/70 text-center py-4">暂无缺失项，匹配度很高！</p>'
                  : analysis.missingItems.map(item => `
                    <div class="flex items-center gap-2 glass p-2.5 rounded-lg">
                      <span class="text-red-400 shrink-0">${icon('x', 16)}</span>
                      <span class="text-sm text-slate-700">${item}</span>
                    </div>
                  `).join('')}
              </div>
            </div>
          </div>

          <!-- Suggestions -->
          <div class="glass-card p-6 md:p-8 mb-6">
            <h3 class="font-heading text-xl font-semibold text-slate-800 mb-4">${icon('lightbulb', 20, 'inline mr-1.5 text-amber-600')}补充建议</h3>
            <div class="space-y-4">
              ${analysis.suggestions.map(s => `
                <div class="glass p-4 rounded-xl">
                  <div class="flex items-start gap-3">
                    <span class="text-xs px-2 py-0.5 rounded-full ${priorityColors[s.priority]}/15 ${priorityColors[s.priority]} font-medium shrink-0 mt-0.5">${priorityLabels[s.priority]}</span>
                    <div class="flex-1">
                      <p class="font-medium text-slate-800 text-sm">${s.text}</p>
                      <p class="text-sm text-slate-500/80 mt-1">${s.detail}</p>
                    </div>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>

          <!-- Rewrite example -->
          <div class="glass-card p-6 md:p-8 mb-6">
            <h3 class="font-heading text-xl font-semibold text-slate-800 mb-4">${icon('edit-3', 20, 'inline mr-1.5 text-brand-dark')}改写示范</h3>
            <div class="glass p-4 rounded-xl mb-3">
              <p class="text-sm text-slate-600 mb-2 font-medium">${icon('file-text', 15, 'inline mr-1')}优化前</p>
              <p class="text-sm text-slate-500 leading-relaxed whitespace-pre-wrap">${(analysis.rewriteExample || '').split('【优化后】')[0].replace('【优化前】', '').trim() || '暂无'}</p>
            </div>
            <div class="glass p-4 rounded-xl mb-3 border-l-4 border-brand-dark">
              <p class="text-sm text-slate-700 mb-2 font-medium">${icon('sparkles', 15, 'inline mr-1 text-brand-dark')}优化后</p>
              <p class="text-sm text-slate-700 leading-relaxed whitespace-pre-wrap">${(analysis.rewriteExample || '').split('【优化后】')[1]?.trim() || analysis.rewriteExample || ''}</p>
            </div>
            <div class="flex gap-3">
              <button onclick="applyRewriteToResume('${analysis.id}')" class="btn-primary flex-1 py-2.5 text-sm cursor-pointer">${icon('check', 16, 'inline mr-1.5')}应用到我的简历</button>
            </div>
          </div>

          <!-- Actions -->
          <div class="flex flex-col sm:flex-row gap-3">
            <button onclick="navigate('match')" class="btn-secondary flex-1 py-3 cursor-pointer">${icon('search', 18, 'inline mr-1.5')}继续匹配岗位</button>
            <button onclick="navigate('home')" class="btn-primary flex-1 py-3 cursor-pointer">${icon('home', 18, 'inline mr-1.5')}返回首页</button>
          </div>

          <!-- Remaining quota notice -->
          ${currentUser.subscriptionType === 'free' ? `
            <div class="glass p-4 rounded-xl mt-6 text-center">
              <p class="text-sm text-slate-600">${icon('zap', 16, 'inline text-amber-600 mr-1')}本月剩余免费分析次数：<span class="font-bold text-brand-dark">${currentUser.freeAnalysisRemaining}</span></p>
              ${currentUser.freeAnalysisRemaining === 0 ? `
                <button onclick="showPaywallModal()" class="btn-primary px-6 py-2 mt-3 text-sm cursor-pointer">${icon('crown', 16, 'inline mr-1')}升级解锁更多次数</button>
              ` : ''}
            </div>
          ` : ''}
        </div>
      `;
    }

    function viewAnalysis(analysisId) {
      window._currentAnalysisId = analysisId;
      navigate('analysis-result');
    }

    // ===== Paywall =====
    function showPaywallModal() {
      const plans = [
        { id: 'single', name: '单次分析', price: 2.9, unit: '次', desc: '适合临时需要', features: ['1 次深度分析', '7 天有效'] },
        { id: 'monthly', name: '月度会员', price: 9.9, unit: '月', desc: '高频求职首选', features: [' unlimited 分析', '30 天有效', '优先客服'], popular: true },
        { id: 'quarterly', name: '季度会员', price: 19.9, unit: '季', desc: '性价比之选', features: ['unlimited 分析', '90 天有效', '优先客服', '简历模板下载'] },
      ];

      showModal(`
        <div class="text-center mb-6">
          <div class="w-16 h-16 mx-auto rounded-2xl bg-gradient-to-br from-amber-400 to-amber-500 flex items-center justify-center text-white shadow-lg mb-4">${icon('crown', 32)}</div>
          <h2 class="font-heading text-2xl font-bold text-slate-800">免费额度已用完</h2>
          <p class="text-slate-500/70 mt-1">升级会员，解锁无限分析</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
          ${plans.map(p => `
            <div class="glass-card p-5 ${p.popular ? 'border-2 border-brand-dark' : ''} relative">
              ${p.popular ? '<span class="absolute -top-2 left-1/2 -translate-x-1/2 text-xs px-2 py-0.5 rounded-full bg-brand-dark text-white font-medium">推荐</span>' : ''}
              <h3 class="font-heading text-lg font-semibold text-slate-800">${p.name}</h3>
              <p class="text-xs text-slate-500/70 mt-0.5">${p.desc}</p>
              <div class="my-4">
                <span class="font-heading text-3xl font-bold text-brand-dark">¥${p.price}</span>
                <span class="text-sm text-slate-500">/${p.unit}</span>
              </div>
              <ul class="space-y-1.5 mb-4">
                ${p.features.map(f => `<li class="text-xs text-slate-600 flex items-center gap-1.5"><span class="text-green-500">${icon('check', 14)}</span>${f}</li>`).join('')}
              </ul>
              <button onclick="subscribe('${p.id}')" class="${p.popular ? 'btn-primary' : 'btn-secondary'} w-full py-2.5 text-sm cursor-pointer">选择${p.name}</button>
            </div>
          `).join('')}
        </div>

        <button onclick="closeModalDirect()" class="btn-secondary w-full py-2.5 text-sm cursor-pointer">稍后再说</button>
      `);
      renderIcons();
    }

    function subscribe(planId) {
      const plans = { single: { name: '单次', type: 'single' }, monthly: { name: '月度', type: 'monthly' }, quarterly: { name: '季度', type: 'quarterly' } };
      const plan = plans[planId];
      currentUser.subscriptionType = plan.type;
      if (plan.type === 'single') {
        currentUser.freeAnalysisRemaining += 1;
      } else {
        currentUser.freeAnalysisRemaining = 999;
      }
      State.set('currentUser', currentUser);
      State.set('user_' + currentUser.id, currentUser);

      closeModalDirect();

      // Show payment success page
      showModal(`
        <div class="text-center py-8">
          <div class="w-20 h-20 mx-auto rounded-full bg-green-500/15 flex items-center justify-center text-green-500 mb-4">${icon('check-circle', 40)}</div>
          <h2 class="font-heading text-2xl font-bold text-slate-800 mb-2">支付成功</h2>
          <p class="text-slate-500/70 mb-6">已开通${plan.name}会员</p>
          <button onclick="closeModalDirect(); navigate('home');" class="btn-primary px-8 py-2.5 cursor-pointer">${icon('home', 18, 'inline mr-1.5')}返回首页</button>
        </div>
      `);
      renderIcons();
      toast(`已开通${plan.name}会员`, 'success');
    }

    // ===== Main Render =====
    function render() {
      const app = document.getElementById('app');

      if (!currentUser) {
        switch (currentView) {
          case 'login': app.innerHTML = viewLogin(); break;
          case 'landing': app.innerHTML = viewLanding(); break;
          default: app.innerHTML = viewLanding();
        }
      } else {
        switch (currentView) {
          case 'login': app.innerHTML = viewLogin(); break;
          case 'home': app.innerHTML = viewHome(); break;
          case 'resume': app.innerHTML = viewResume(); break;
          case 'match': app.innerHTML = viewMatch(); break;
          case 'favorites': app.innerHTML = viewFavorites(); break;
          case 'optimize': app.innerHTML = viewOptimize(); break;
          case 'resume-pdf': app.innerHTML = viewResumePdf(); break;
          case 'analysis-loading': app.innerHTML = viewAnalysisLoading(); break;
          case 'analysis-result': app.innerHTML = viewAnalysisResult(); break;
          default: app.innerHTML = viewHome();
        }
      }

      renderIcons();
    }

    // ===== Init =====
    document.addEventListener('DOMContentLoaded', () => {
      // 初始化演示简历（林思远完整简历），确保始终存在
      const tempUser = { id: 'demo' };
      const tempState = {
        get: (k, d) => { try { const v = localStorage.getItem('careergo_' + k); return v ? JSON.parse(v) : d; } catch { return d; } },
        set: (k, v) => localStorage.setItem('careergo_' + k, JSON.stringify(v)),
      };
      if (!tempState.get('resumes_demo', null)) {
        const demoData = getDemoResumeData();
        tempState.set('resumes_demo', [demoData]);
        tempState.set('activeResumeId_demo', demoData.id);
        tempState.set('resume_demo', demoData);
      }
      renderIcons();
      render();
    });
  </script>
</body>
</html>
